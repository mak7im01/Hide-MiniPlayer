<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="250" height="250">
  <!-- Фон -->
  <rect width="250" height="250" rx="40" fill="#1a1a1a"/>

  <!-- Мини-плеер (аудио) -->
  <rect x="30" y="75" width="190" height="100" rx="18" fill="#2a2a2a" stroke="#c0a0ff" stroke-width="5"/>

  <!-- Обложка альбома слева -->
  <rect x="46" y="91" width="68" height="68" rx="10" fill="#1a1a1a" stroke="#c0a0ff" stroke-width="3" opacity="0.8"/>
  <!-- Нотка на обложке -->
  <g fill="#c0a0ff" opacity="0.4" transform="translate(55, 97) scale(0.9)">
    <ellipse cx="18" cy="42" rx="10" ry="7" transform="rotate(-15 18 42)"/>
    <rect x="26" y="10" width="4" height="34" rx="2"/>
    <path d="M30 10 Q46 16 42 28 Q36 22 30 24 Z"/>
  </g>

  <!-- Название трека -->
  <rect x="128" y="98" width="76" height="8" rx="4" fill="#c0a0ff" opacity="0.8"/>
  <!-- Артист -->
  <rect x="128" y="114" width="52" height="6" rx="3" fill="#c0a0ff" opacity="0.4"/>

  <!-- Кнопки управления -->
  <!-- Предыдущий -->
  <polygon points="128,142 128,158 140,150" fill="#c0a0ff" opacity="0.6" transform="scale(-1,1) translate(-268,0)"/>
  <rect x="124" y="142" width="4" height="16" rx="2" fill="#c0a0ff" opacity="0.6"/>
  <!-- Play -->
  <polygon points="148,140 148,160 168,150" fill="#c0a0ff" opacity="0.9"/>
  <!-- Следующий -->
  <polygon points="176,142 176,158 188,150" fill="#c0a0ff" opacity="0.6"/>
  <rect x="188" y="142" width="4" height="16" rx="2" fill="#c0a0ff" opacity="0.6"/>

  <!-- Прогресс-бар -->
  <rect x="46" y="172" width="158" height="6" rx="3" fill="#1a1a1a"/>
  <rect x="46" y="172" width="70" height="6" rx="3" fill="#c0a0ff" opacity="0.7"/>
  <!-- Ползунок -->
  <circle cx="116" cy="175" r="6" fill="#c0a0ff"/>

  <!-- Красная перечёркивающая линия -->
  <line x1="38" y1="38" x2="212" y2="212" stroke="#ff4d4d" stroke-width="14" stroke-linecap="round"/>
  <line x1="38" y1="38" x2="212" y2="212" stroke="#ff000044" stroke-width="20" stroke-linecap="round"/>
</svg>
